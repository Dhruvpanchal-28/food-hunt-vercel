<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Hunt - Order Food Online</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="mobile.css">
    
    <style>
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        
        .food-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .food-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
        
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
            color: #28a745 !important;
        }
        
        .search-box {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-utensils"></i> Food Hunt
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showHome()">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showFoods()">Food</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showVendors()">Vendors</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showLogin()">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showRegister()">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container">
            <h1 class="display-4 mb-4">Welcome to Food Hunt</h1>
            <p class="lead mb-4">Order delicious food from your favorite vendors</p>
            
            <!-- Search Box -->
            <div class="search-box">
                <div class="input-group">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search for food or vendors...">
                    <button class="btn btn-success" onclick="performSearch()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container my-5">
        <!-- Messages -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p>Loading...</p>
        </div>

        <!-- Content Sections -->
        <div id="content">
            <!-- Home Content -->
            <div id="homeContent">
                <h2 class="text-center mb-4">Featured Foods</h2>
                <div class="row" id="featuredFoods"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 Food Hunt. All rights reserved.</p>
        </div>
    </footer>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="loginEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Register</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="registerName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="registerEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="registerPhone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" id="registerAddress" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="registerPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // API Base URL - Change this to your Railway API URL
        const API_BASE = 'https://your-api-url.railway.app';
        
        // Global variables
        let currentUser = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadFeaturedFoods();
            setupEventListeners();
        });
        
        function setupEventListeners() {
            // Login form
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                handleLogin();
            });
            
            // Register form
            document.getElementById('registerForm').addEventListener('submit', function(e) {
                e.preventDefault();
                handleRegister();
            });
            
            // Search input
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        }
        
        // API Helper Functions
        async function apiCall(endpoint, method = 'GET', data = null) {
            showLoading(true);
            hideMessages();
            
            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };
                
                if (data) {
                    options.body = JSON.stringify(data);
                }
                
                const response = await fetch(API_BASE + endpoint, options);
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error || 'API request failed');
                }
                
                return result;
            } catch (error) {
                showError(error.message);
                throw error;
            } finally {
                showLoading(false);
            }
        }
        
        // Load Featured Foods
        async function loadFeaturedFoods() {
            try {
                const foods = await apiCall('/foods');
                displayFoods(foods.slice(0, 6)); // Show first 6 foods
            } catch (error) {
                console.error('Failed to load foods:', error);
            }
        }
        
        // Display Foods
        function displayFoods(foods) {
            const container = document.getElementById('featuredFoods');
            container.innerHTML = '';
            
            foods.forEach(food => {
                const foodCard = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card food-card">
                            <img src="https://picsum.photos/seed/food${food.food_id}/400/300.jpg" class="food-img" alt="${food.foodname}">
                            <div class="card-body">
                                <h5 class="card-title">${food.foodname}</h5>
                                <p class="card-text">
                                    <i class="fas fa-tag"></i> ${food.cuisines}<br>
                                    <i class="fas fa-rupee-sign"></i> ${food.cost}
                                </p>
                                <button class="btn btn-success" onclick="orderFood(${food.food_id})">
                                    <i class="fas fa-shopping-cart"></i> Order Now
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += foodCard;
            });
        }
        
        // Search
        async function performSearch() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (!searchTerm) {
                showError('Please enter a search term');
                return;
            }
            
            try {
                const results = await apiCall(`/search?q=${encodeURIComponent(searchTerm)}&type=food`);
                displayFoods(results);
                showSuccess(`Found ${results.length} results for "${searchTerm}"`);
            } catch (error) {
                console.error('Search failed:', error);
            }
        }
        
        // Login
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const result = await apiCall('/login', 'POST', { email, password });
                
                if (result.success) {
                    currentUser = result.user;
                    showSuccess('Login successful!');
                    
                    // Close modal
                    const modal = bootstrap.Modal.getInstance(document.getElementById('loginModal'));
                    modal.hide();
                    
                    // Update UI
                    updateUIForLoggedInUser();
                }
            } catch (error) {
                console.error('Login failed:', error);
            }
        }
        
        // Register
        async function handleRegister() {
            const userData = {
                name: document.getElementById('registerName').value,
                email: document.getElementById('registerEmail').value,
                phone: document.getElementById('registerPhone').value,
                address: document.getElementById('registerAddress').value,
                password: document.getElementById('registerPassword').value
            };
            
            try {
                const result = await apiCall('/register', 'POST', userData);
                
                if (result.success) {
                    showSuccess('Registration successful! Please login.');
                    
                    // Close modal
                    const modal = bootstrap.Modal.getInstance(document.getElementById('registerModal'));
                    modal.hide();
                    
                    // Clear form
                    document.getElementById('registerForm').reset();
                    
                    // Show login modal
                    setTimeout(() => {
                        new bootstrap.Modal(document.getElementById('loginModal')).show();
                    }, 1000);
                }
            } catch (error) {
                console.error('Registration failed:', error);
            }
        }
        
        // Order Food
        function orderFood(foodId) {
            if (!currentUser) {
                showError('Please login to order food');
                new bootstrap.Modal(document.getElementById('loginModal')).show();
                return;
            }
            
            // For now, just show a message
            showSuccess('Order placed successfully!');
        }
        
        // Navigation Functions
        function showHome() {
            loadFeaturedFoods();
        }
        
        async function showFoods() {
            try {
                const foods = await apiCall('/foods');
                displayFoods(foods);
            } catch (error) {
                console.error('Failed to load foods:', error);
            }
        }
        
        async function showVendors() {
            try {
                const vendors = await apiCall('/vendors');
                displayVendors(vendors);
            } catch (error) {
                console.error('Failed to load vendors:', error);
            }
        }
        
        function displayVendors(vendors) {
            const container = document.getElementById('content');
            container.innerHTML = `
                <h2 class="text-center mb-4">Food Vendors</h2>
                <div class="row" id="vendorsList"></div>
            `;
            
            const vendorsContainer = document.getElementById('vendorsList');
            vendorsContainer.innerHTML = '';
            
            vendors.forEach(vendor => {
                const vendorCard = `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card food-card">
                            <div class="card-body">
                                <h5 class="card-title">${vendor.fld_name}</h5>
                                <p class="card-text">
                                    <i class="fas fa-envelope"></i> ${vendor.fld_email}<br>
                                    <i class="fas fa-phone"></i> ${vendor.fld_mob}<br>
                                    <i class="fas fa-map-marker-alt"></i> ${vendor.fld_address}
                                </p>
                                <button class="btn btn-primary" onclick="viewVendor(${vendor.fldvendor_id})">
                                    <i class="fas fa-eye"></i> View Menu
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                vendorsContainer.innerHTML += vendorCard;
            });
        }
        
        function showLogin() {
            new bootstrap.Modal(document.getElementById('loginModal')).show();
        }
        
        function showRegister() {
            new bootstrap.Modal(document.getElementById('registerModal')).show();
        }
        
        function viewVendor(vendorId) {
            showSuccess(`Viewing menu for vendor ${vendorId}`);
        }
        
        // UI Helper Functions
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function updateUIForLoggedInUser() {
            // Update navigation to show user is logged in
            const navbar = document.querySelector('.navbar-nav');
            // You can customize this based on your needs
        }
    </script>
</body>
</html>
